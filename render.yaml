services:
  - type: web
    name: erp-sprint-progress-system
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    buildCommand: npm ci --include=dev && npm run api:build && npm run web:build
    startCommand: npm run api:start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_NAME
        value: ERP Sprint Progress System
      - key: API_HOST
        value: 0.0.0.0
      - key: API_BASE_URL
        value: https://erp-sprint-progress-system.onrender.com
      - key: TRUST_PROXY_HOPS
        value: "1"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: itdcc
      - key: MONGODB_AUTO_INDEX
        value: "false"
      - key: MONGODB_MAX_POOL_SIZE
        value: "20"
      - key: MONGODB_MIN_POOL_SIZE
        value: "0"
      - key: MONGODB_SERVER_SELECTION_TIMEOUT_MS
        value: "10000"
      - key: MONGODB_CONNECT_TIMEOUT_MS
        value: "10000"
      - key: MONGODB_SOCKET_TIMEOUT_MS
        value: "45000"
      - key: AUTH_PROVIDER
        value: local
      - key: SESSION_SECRET
        sync: false
      - key: COOKIE_NAME
        value: itdcc_session
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAME_SITE
        value: lax
      - key: CSRF_COOKIE_NAME
        value: itdcc_csrf
      - key: CSRF_HEADER_NAME
        value: x-csrf-token
      - key: SESSION_TTL_HOURS
        value: "8"
      - key: BCRYPT_SALT_ROUNDS
        value: "12"
      - key: AUTH_MAX_FAILED_LOGIN_ATTEMPTS
        value: "5"
      - key: AUTH_LOCK_MINUTES
        value: "15"
      - key: AUTH_RATE_LIMIT_MAX_REQUESTS
        value: "20"
      - key: FORCE_PASSWORD_CHANGE_ON_FIRST_LOGIN
        value: "true"
      - key: RATE_LIMIT_WINDOW_MINUTES
        value: "15"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "300"
      - key: CORS_ORIGIN
        value: https://erp-sprint-progress-system.onrender.com
      - key: AUDIT_LOG_ENABLED
        value: "true"
      - key: ALLOW_DEVELOPMENT_SEED
        value: "false"
